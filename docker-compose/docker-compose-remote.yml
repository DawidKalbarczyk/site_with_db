services:
  db:
    build:
      context: ..
      dockerfile: dockerfile/postgres/Dockerfile
    image: postgres-db
    container_name: postgres-db-${ENV_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data



  web:
    build:
      context: ..
      dockerfile: dockerfile/web/Dockerfile
    image: site-web
    container_name: site-web-${ENV_NAME}
    environment:
      WEB_TEST: ${WEB_TEST}
      ENV_NAME: ${ENV_NAME}
    ports:
      - ${WEB_PORT}:80
    depends_on:
      - db

  fastapi:
    build:
      context: ..
      dockerfile: dockerfile/fastapi/Dockerfile
    image: site-fastapi
    container_name: site-fastapi-${ENV_NAME}
    ports:
      - ${FASTAPI_PORT}:80

volumes: 
  postgres_data: